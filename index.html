<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>Profile</title>
  <style>
    body {
      font-family: Arial, Sans-Serif;
      background: #fafafa;
      margin: 0;
    }
    
    .container {
      max-width: 900px;
      margin: auto;
      padding: 20px;
    }
    .profile {
      display: flex;
      align-items: center;
      gap: 40px;
    }
    .profile img {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      object-fit: cover;
    }
    .info {
      flex: 1;
    }
    .username {
      font-size: 24px;
      margin-bottom: 10px;
      font-weight: bold;
    }
    .stats {
      display: flex;
      gap: 20px;
      margin-bottom: 10px;
    }
    .stats span {
      font-weight: bold;
    }
    .bio {
      margin-top: 5px;
    }
    .grid {
      margin-top: 30px;
      display: grid;
      grid-template-columns: repeat(3,1fr); /* 3 kolom */
      gap: 5px; /* jarak antar foto */
    }
    .grid img {
      width: 100%;
      aspect-ratio: 1/1.12;
      object-fit: cover;
      cursor: pointer;
      transition: transform 0.2s ease, opacity 0.2s;
    }
    .grid img:hover {
      transform: scale(1.05);
      opacity: 0.8;
    }
    .tabs {
      display: flex;
      justify-content: space-around;
      border-top: 1px solid #ddd;
      border-bottom: 1px solid #ddd;
      margin-top: 20px;
    }
    
    .tab {
      flex: 1;
      text-align: center;
      padding: 10px;
      cursor: pointer;
      font-size: 20px;
      opacity: 0.5;
      transition: 0.3s;
    }
    
    .tab.active {
      opacity: 1;
      border-bottom: 2px solid black;
    }
    #modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.9);
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }
    #modal img {
      max-width: 90%;
      max-height: 90%;
      transition: transform 0.3s ease;
      will-change: transform;
      backface-visibility: hidden;
    }
    .close {
      position: absolute;
      top: 20px;
      right: 20px;
      color: white;
      font-size: 25px;
      cursor: pointer;
    }
    .btn {
      padding: 6px 12px;
      border: 1px solid #ccc;
      background: white;
      cursor: pointer;
      border-radius: 5px;
      margin-left: 10px;
    }
    
  </style>
</head>
<body>
  
  <div class="container">
    
      <div class="profile">
        <img 
        src="https://darobiteam1-maker.github.io/Belajar-/IMG-20260411-WA0004.jpg"
        alt="Profile">
        
        <div class="info">
          <div class="username">@Darobi_07
          <button class="btn">Edit Profile</button>
          </div>
          
          <div class="stats">
            <div><span>12</span> posts</div>
            <div><span>100k</span> followers</div>
            <div><span>500</span> following</div>
          </div>
          <div class="bio">
            <b>Darobi_07</b><br>
            Ora Ngapak Ora Kepenak
          </div>
        </div>
      </div>
      <div class="tabs">
      <div class="tab active"
    onclick="switchTab('post', this)">📷</div>
      <div class="tab"
    onclick="switchTab('reels', this)">🎬</div>
      <div class="tab"
    onclick="switchTab('tagged', this)">🏷️</div>
    </div>
      <div class="grid">
        <img src="https://darobiteam1-maker.github.io/Belajar/Gambar9.jpeg"
        onclick="openImg(this)">
        <img src="https://darobiteam1-maker.github.io/Belajar/Gambar8.jpeg"
        onclick="openImg(this)">
        <img src="https://darobiteam1-maker.github.io/Belajar/Gambar7.jpeg"
        onclick="openImg(this)">
        <img src="https://darobiteam1-maker.github.io/Belajar/Gambar6.jpeg"
        onclick="openImg(this)">
        <img src="https://darobiteam1-maker.github.io/Belajar/Gambar5.jpeg"
        onclick="openImg(this)">
        <img src="https://darobiteam1-maker.github.io/Belajar/Gambar4.jpeg"
        onclick="openImg(this)">
        <img src="https://darobiteam1-maker.github.io/Belajar/Gambar3.jpeg"
        onclick="openImg(this)">
        <img src="https://darobiteam1-maker.github.io/Belajar/Gambar2.jpeg"
        onclick="openImg(this)">
        <img src="https://darobiteam1-maker.github.io/Belajar/Gambar1.jpeg"
        onclick="openImg(this)">
        <img src="https://darobiteam1-maker.github.io/Belajar/Kartun1.jpeg"
        onclick="opemImg(this)">
        <img src="https://darobiteam1-maker.github.io/Belajar/Kartun2.jpeg"
        onclick="opemImg(this)">
        <img src="https://darobiteam1-maker.github.io/Belajar/Kartun3.jpeg"
        onclick="openImg(this)">
        
      </div>
      <!-- MODAL -->
      <div id="modal">
        <span class="close"
        onclick="closeImg()">✖</span>
        <img id="modalImg">
      </div>
  </div>
    

  <script>
    let images=[
      "https://darobiteam1-maker.github.io/Belajar/Gambar9.jpeg",
      "https://darobiteam1-maker.github.io/Belajar/Gambar8.jpeg",
      "https://darobiteam1-maker.github.io/Belajar/Gambar7.jpeg",
      "https://darobiteam1-maker.github.io/Belajar/Gambar6.jpeg",
      "https://darobiteam1-maker.github.io/Belajar/Gambar5.jpeg",
      "https://darobiteam1-maker.github.io/Belajar/Gambar4.jpeg",
      "https://darobiteam1-maker.github.io/Belajar/Gambar3.jpeg",
      "https://darobiteam1-maker.github.io/Belajar/Gambar2.jpeg",
      "https://darobiteam1-maker.github.io/Belajar/Gambar1.jpeg",
      "https://darobiteam1-maker.github.io/Belajar/Kartun1.jpeg",
      "https://darobiteam1-maker.github.io/Belajar/Kartun2.jpeg",
      "https://darobiteam1-maker.github.io/Belajar/Kartun3.jpeg",
      "https://darobiteam1-maker.github.io/Belajar/Kartun3.jpeg",
      ];
      let currentIndex= 0;
      let startX= 0;
      let currentX = 0;
      let isDragging = false;
      
      const modal =
      document.getElementById("modal");
      const modalImg =
      document.getElementById("modalImg");
      
    function openImg(img){
      currentIndex= images.indexOf(img.src);
      modal.style.display ="flex";
      showImg();
    }
    
    function closeImg() {
      modal.style.display = "none";
    }
    function showImg() {
      modalImg.src = images[currentIndex];
      modalImg.style.transition= "none";
      modalImg.style.transform=
      "translateX(0)";
    }
    function switchTab(type, el) {
      // ubah active tab
      
      document.querySelectorAll(".tab").forEach(tab => {
        tab.classList.remove("active");
      });
      el.classList.add("active");
      console.log("pindah ke:", type);
    }
    
    // START DRAG
   modal.addEventListener("touchstart", (e)=>{
     startX = e.touches[0].clientX;
     currentX = startX;
     isDragging = true;
     modalImg.style.transition = "none";
   });
   
   // DRAG MOVE (REALTIME)
    modal.addEventListener("touchmove", (e)=>{
      if(!isDragging) return;
      
      currentX = e.touches[0].clientX;
      let diff = currentX - startX;
      
      if ((currentIndex === 0&& diff > 0) ||
      (currentIndex === images.length -1 && diff <0)) {
        diff *=0.3;
      }
      
      modalImg.style.transform =`translateX(${diff}px)`;
    });
    // RELEASE (SNAP)
    modal.addEventListener("touchend", ()=>{
      if(!isDragging) return;
      isDragging = false;
      
      let diff = currentX - startX;
      
      modalImg.style.transform= `translateX(${diff}px)`;
      
      modalImg.style.transition = "transform 0.35s cubic-bezier(0.22, 1, 0.36, 1)";
      
      if(diff < -60){
        nextImg();
      } else if(diff >60){
        prevImg();
      } else {
        modalImg.style.transform =
        "translateX(0)";
      }
    });
    
    // Next
    function nextImg(){
      modalImg.style.transform =
      "translateX(-100%)";
      
      setTimeout(()=>{
        if (currentIndex >= images.length -1) {
          modalImg.style.transform =
          "translateX(-40px)";
          setTimeout(()=> {
            modalImg.style.transform =
            "translateX(0)";
          }, 150);
          return;
        }
        
        modalImg.style.transition = "transform 0.35s cubic-bezier(0.22, 1, 0.36, 1)";
        modalImg.style.transform =
      "translateX(-100%)";
        currentIndex++;
        modalImg.src = images[currentIndex];
        
        setTimeout(()=>{
          
          modalImg.style.transition = "none";
          modalImg.style.transform =
      "translateX(100%)";
      modalImg.style.transform=
      "translateX(0)";
        });
      }, 300);
    }
    
    // Prev
    function prevImg(){
      if (currentIndex <= 0 ){
        modalImg.style.transform=
        "translateX(40)"
        
        setTimeout(()=> {
          modalImg.style.transform=
          "translateX(0)"
        }, 150);
        return;
      }
      
      modalImg.style.transition ="transform 0.35s cubic-bezier(0.22, 1, 0.36, 1)";
      modalImg.style.transform =
      "translateX(100%)";
      
      setTimeout(()=>{
        currentIndex--;
        
        modalImg.style.transition = "none";
        modalImg.style.transform =
        "translateX(-100%)";
        modalImg.src =
        images[currentIndex];
        
        requestAnimationFrame(()=>{
          modalImg.style.transition =
          "transform 0.35s cubic-bezier(0.22, 1, 0.36, 1)";
          modalImg.style.transform =
          "translateX(0)";
        });
      }, 300);
    }
    modal.addEventListener("click", (e)=>{
      if(e.target.id === "modal"){
        closeImg();
      }
    });
    
    
  </script>
  
</body>
</html>
